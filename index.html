<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Alumnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <div class="container py-5">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center">
                <h1 class="mb-0">
                    Sistema de Gestión de Alumnos
                </h1>
            </div>
            <div class="card-body">
                <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
                    <button id="btnAgregar" class="btn btn-success">
                        Agregar alumno
                    </button>
                    <button id="btnBuscar" class="btn btn-primary">
                        Buscar
                    </button>
                    <button id="btnEliminar" class="btn btn-danger">
                        Eliminar
                    </button>
                    <button id="btnEstadisticas" class="btn btn-warning">
                        Estadísticas
                    </button>
                </div>
                <div class="alert alert-info text-center fw-bold">
                    <span id="cantidadAlumnos"></span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover table-striped table-bordered align-middle text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Promedio</th>
                            </tr>
                        </thead>
                        <tbody id="tablaAlumnos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/validaciones.js"></script>
    <script src="assets/js/alumnos.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
